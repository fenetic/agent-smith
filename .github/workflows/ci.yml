name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint and format
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Unit project only — offline and deterministic, so no API key is needed.
      # The integration project is opt-in and deliberately not run here.
      - name: Test
        run: npm test
